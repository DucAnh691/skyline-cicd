# --- ISTIO GATEWAY (Cánh cửa duy nhất ra Internet) ---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: skyline-gateway
spec:
  selector:
    istio: ingressgateway # Sử dụng Istio Ingress Controller mặc định
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
# --- User Service Configuration ---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: user-service
spec:
  hosts:
    - "*"
  gateways:
    - skyline-gateway
  http:
    - match:
        - uri:
            prefix: /user
      rewrite:
        uri: /
      route:
        - destination:
            host: user-service
            subset: v1
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: user-service
spec:
  host: user-service
  subsets:
    - name: v1
      labels:
        version: v1

