version: '3.8'

services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
    networks:
      - skyline-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    networks:
      - skyline-net

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
    networks:
      - skyline-net

networks:
  skyline-net:
    driver: bridge