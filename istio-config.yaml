# --- Security: Mutual TLS (mTLS) STRICT Mode ---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-namespace-policy
  namespace: default
spec:
  mtls:
    mode: STRICT